<section>
  <span *ngFor="let permission of permissions| keyvalue" >
    <div class="permissions">
      <d-card *ngFor="let item of permission.value" class="permissions-card">
        <d-card-content>
          <app-user-popover
            [username]="permission.key"
            style="margin-right: 8px"
          ></app-user-popover>
          <d-tag
            *ngFor="let role of item.userPermissions"
            style="margin-right: 5px;"
            [tag]="role"
            [customViewTemplate]="customTag"
            [labelStyle]="''"
          >
          </d-tag>
          <ng-template #customTag let-tag="tag">
            <div>
              <span class="progress-container circle-type">
                <d-progress
                  [type]="'circle'"
                  [strokeWidth]="18"
                  [percentage]="tag.lifeCycleExpires?.survivalRate"
                  [strokeColor]="getProgressColor(tag.expiredTime)"
                  [showContent]="false"
                  style="display: inline-block"
                  *ngIf="tag.id !== null"
                ></d-progress>
                <span *ngIf="tag.id !== null" [style.background]="isExpired(tag.expiredTime) ? '#ad215b' : '#5e9629'" style="display: inline-block; color: #fff; border-radius: 2px; padding: 0 4px; margin-left: 4px; font-size: 11px;">{{ tag.role }}</span>
                <span *ngIf="tag.id !== null && tag.expiredTime" [style.color]="getProgressColor(tag.expiredTime)" style="margin-left: 4px; font-size: 10px;">{{ getCompactExpirationText(tag.expiredTime) }}</span>
                <span *ngIf="tag.id === null">&nbsp;{{ tag.role }}</span>
              </span>
            </div>
          </ng-template>
        </d-card-content>
      </d-card>
    </div>
  </span>
  <d-tag [tag]="'No permissions'" *ngIf="JSON.stringify(permissions) === '{}'"></d-tag>
</section>
