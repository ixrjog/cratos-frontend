<section>
  <d-tabs [(activeTab)]="editorTab" type="pills">
    <d-tab [id]="'basic'" [title]="'Basic'">
      <form
        dForm
        ngForm
        [dValidateRules]="formRules['rule']"
        [layout]="layoutDirection"
      >
        <d-form-item>
          <d-form-label [required]="true">Name</d-form-label>
          <d-form-control>
            <input dTextInput name="name" [(ngModel)]="formData.name" [dValidateRules]="formRules['name']" />
          </d-form-control>
        </d-form-item>
        <d-form-item>
          <d-form-label>Country</d-form-label>
          <d-form-control>
            <d-tabs type="options" [activeTab]="formData.country" (activeTabChange)="formData.country = $any($event)">
              <d-tab *ngFor="let item of countryOptions" [id]="item" [title]="item"></d-tab>
            </d-tabs>
          </d-form-control>
        </d-form-item>
        <div style="display: flex; gap: 16px;">
          <d-form-item style="flex: 1;">
            <d-form-label>Priority</d-form-label>
            <d-form-control>
              <d-tabs type="options" [activeTab]="formData.priority" (activeTabChange)="formData.priority = $any($event)">
                <d-tab *ngFor="let item of priorityOptions" [id]="item" [title]="item"></d-tab>
              </d-tabs>
            </d-form-control>
          </d-form-item>
          <d-form-item style="flex: 1;">
            <d-form-label>Available Status</d-form-label>
            <d-form-control>
              <d-tabs type="options" [activeTab]="formData.availableStatus" (activeTabChange)="formData.availableStatus = $any($event)">
                <d-tab *ngFor="let item of availableStatusOptions" [id]="item" [title]="item"></d-tab>
              </d-tabs>
            </d-form-control>
          </d-form-item>
        </div>
        <d-form-item>
          <d-form-label>Construction Phase</d-form-label>
          <d-form-control>
            <d-tabs type="options" [activeTab]="formData.constructionPhase" (activeTabChange)="formData.constructionPhase = $any($event)">
              <d-tab *ngFor="let item of constructionPhaseOptions" [id]="item" [title]="item"></d-tab>
            </d-tabs>
          </d-form-control>
        </d-form-item>
        <d-form-item>
          <d-form-label>Monitor URL</d-form-label>
          <d-form-control>
            <input dTextInput name="monitorUrl" [(ngModel)]="formData.monitorUrl" />
          </d-form-control>
        </d-form-item>
        <d-form-item>
          <d-form-label>Description</d-form-label>
          <d-form-control>
            <textarea
              dTextarea
              name="comment"
              maxlength="200"
              style="height: 80px"
              [(ngModel)]="formData.comment"
            ></textarea>
          </d-form-control>
        </d-form-item>
      </form>
    </d-tab>
    <d-tab [id]="'networkInfo'" [title]="'Network Info (Markdown)'">
      <textarea
        dTextarea
        name="networkInfo"
        maxlength="5000"
        style="height: 400px; width: 100%; margin-top: 10px;"
        [(ngModel)]="formData.networkInfo"
      ></textarea>
    </d-tab>
  </d-tabs>
</section>
