<div class="spacing-search">
  <d-button class="button" bsStyle="primary" (click)="onRowNew()" [disabled]="!selectedChannel">New</d-button>
  <d-tabs class="tabs" type="options" [activeTab]="selectedCountry" (activeTabChange)="onCountryChange($event)">
    <d-tab [id]="''" [title]="'All'"></d-tab>
    <d-tab *ngFor="let cc of countryOptions" [id]="cc.value">
      <ng-template dTabTitle>
        {{ cc.label }} <span class="count-badge">{{ cc.count }}</span>
      </ng-template>
    </d-tab>
  </d-tabs>
  <d-search
    class="search"
    [(ngModel)]="queryParam.queryName"
    [iconPosition]="'left'"
    (searchFn)="fetchData()"
    (change)="fetchData()"
  ></d-search>
  <d-button class="button" bsStyle="common" (click)="fetchData()" [disabled]="!selectedChannel">Filter</d-button>
</div>
<div class="channel-node-layout">
  <!-- Left: Channel List -->
  <div class="channel-sidebar">
    <div class="channel-list">
      <div
        *ngFor="let ch of filteredChannelOptions"
        class="channel-item"
        [class.active]="selectedChannel?.value === ch.value"
        (click)="onChannelChange(ch)"
      >
        <span class="channel-name">{{ ch.label }}</span>
        <d-tag *ngIf="ch.country" [tag]="ch.country" [labelStyle]="'blue-w98'"></d-tag>
      </div>
    </div>
  </div>

  <!-- Right: Content -->
  <div class="channel-main">
<div class="spacing-table">
  <d-data-table
    dLoading
    [dataSource]="table.data"
    [tableOverflowType]="'overlay'"
    [backdrop]="true"
    [scrollable]="true"
    [loadingStyle]="'infinity'"
    [loading]="table.loading"
    [checkable]="true"
  >
    <d-column field="name" header="Name"></d-column>
    <d-column field="nodeType" header="Type">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <d-tag *ngIf="cellItem" [tag]="cellItem" [labelStyle]="'blue-w98'"></d-tag>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="sourceEndpoint" header="Source Endpoint"></d-column>
    <d-column field="channelName" header="Channel"></d-column>
    <d-column field="seq" header="Seq" [width]="'60px'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span class="seq-badge" [class.seq-zero]="!cellItem">S{{ cellItem || 0 }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="linkedChannel" header="Linked to Channel">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <div style="text-align: center;"><i *ngIf="cellItem" class="icon-right" style="color: #3dcca6;"></i></div>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="monitorUrl" header="Monitor URL">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <a *ngIf="cellItem" [href]="cellItem" target="_blank">
            <d-icon [icon]="'icon-link'" [operable]="true"></d-icon>
          </a>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="comment" header="Comment"></d-column>
    <d-column field="nodeInfo" header="Node Info">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <d-icon *ngIf="rowItem.nodeInfo" [icon]="'icon-go-document'" [operable]="true"
                  (click)="onShowNodeInfo(rowItem)"></d-icon>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="Actions">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <d-icon-group>
            <d-icon [icon]="'icon-edit'" [operable]="true" (click)="onRowEdit(rowItem)"></d-icon>
            <d-icon [icon]="'icon-priority'" [operable]="true" [color]="getRowColor(rowItem['valid'])" (click)="onRowValid(rowItem)"></d-icon>
            <span dDropDown appendToBody>
              <d-icon dDropDownToggle [icon]="'icon-more-operate'" [operable]="true"></d-icon>
              <ul dDropDownMenu>
                <li class="devui-dropdown-item" (click)="onRowDelete(rowItem)">Delete</li>
              </ul>
            </span>
          </d-icon-group>
        </ng-template>
      </d-cell>
    </d-column>
  </d-data-table>
</div>
<div class="spacing-pagination">
  <div dDropDown class="batch-button">
    <d-button-group>
      <d-button bsStyle="common" dDropDownToggle>Batch<span class="icon icon-select-arrow"></span></d-button>
    </d-button-group>
    <ul dDropDownMenu class="devui-dropdown-menu" role="menu">
      <li role="menuitem" (click)="onBatchDelete()"><a dDropDownMenuItem><span class="icon-delete" style="padding-right: 5px; vertical-align: middle"> Delete</span></a></li>
    </ul>
  </div>
  <d-pagination
    class="pagination"
    [total]="table.pager.total"
    [(pageSize)]="table.pager.pageSize"
    [(pageIndex)]="table.pager.pageIndex"
    [canViewTotal]="true"
    [canChangePageSize]="true"
    [maxItems]="5"
    (pageIndexChange)="pageIndexChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  ></d-pagination>
</div>
<!-- Node Info Dialog -->
<ng-template #nodeInfoTemplate>
  <div style="overflow: auto; padding: 20px;">
    <markdown lineNumbers lineHighlight mermaid [data]="nodeInfoContent" [disableSanitizer]="true"></markdown>
  </div>
</ng-template>
<!-- Line Graph -->
<div class="line-graph" *ngIf="lineLevels.length">
  <h5 class="graph-title">Channel Topology</h5>
  <div class="graph-content">
    <div class="graph-column" *ngFor="let level of lineLevels">
      <ng-container *ngFor="let line of level">
        <div *ngIf="!isNetworkLine(line.nodeType)" class="graph-item editable" [id]="'graph-line-' + getLineIndex(line)"
             (click)="onRowEdit(line)" style="position: relative;">
          <div class="node-header">
            <i class="fas fa-server" *ngIf="line.nodeType === 'IDC'"></i>
            <i class="fas fa-cloud" *ngIf="line.nodeType === 'CLOUD'"></i>
            <span class="graph-name">{{ line.name }}</span>
            <d-icon *ngIf="line.nodeInfo" [icon]="'icon-go-document'" [operable]="true"
                    (click)="onShowNodeInfo(line); $event.stopPropagation()" style="font-size: 12px;"></d-icon>
            <span class="seq-badge seq-card">S{{ line.seq }}</span>
          </div>
          <div class="node-icon-area" *ngIf="line.nodeType === 'CLOUD' || line.nodeType === 'IDC'">
            <hr class="node-divider">
            <img [src]="getNodeStyleIcon(line.style)" class="node-dc-icon" alt="dc">
          </div>
        </div>
      </ng-container>
    </div>
    <div class="channel-card" id="graph-channel-card" *ngIf="selectedChannel">
      <div class="card-inner">
        <div class="card-title"><i class="fab fa-instalod" style="margin-right: 6px;"></i>{{ selectedChannel.label }}</div>
      </div>
    </div>
  </div>
  <div class="hidden-nodes-legend" *ngIf="hiddenNodesList.length">
    <span *ngFor="let node of hiddenNodesList" class="hidden-node-card editable" (click)="onRowEdit(node)">
      <span class="hidden-num">#{{ node.hiddenNum }}</span>
      <span class="hidden-name">{{ node.name }}</span>
      <d-icon *ngIf="node.nodeInfo" [icon]="'icon-go-document'" [operable]="true"
              (click)="onShowNodeInfo(node); $event.stopPropagation()" style="font-size: 12px;"></d-icon>
      <d-tag [tag]="node.nodeType" [labelStyle]="'blue-w98'"></d-tag>
    </span>
  </div>
</div>
  </div>
</div>
