<div style="padding: 8px;">
  <div style="margin-bottom: 12px;">
    <label style="font-weight: bold; display: block; margin-bottom: 4px;">Private Address Range</label>
    <d-tabs
      type="options"
      [activeTab]="selectedParentCidr"
      (activeTabChange)="selectedParentCidr = $any($event); onFind()"
    >
      <d-tab *ngFor="let cidr of parentCidrOptions" [id]="cidr" [title]="cidr"></d-tab>
    </d-tabs>
  </div>
  <div style="margin-bottom: 12px;">
    <label style="font-weight: bold; display: block; margin-bottom: 4px;">Prefix Length</label>
    <d-tabs
      type="options"
      [activeTab]="selectedPrefixLength"
      (activeTabChange)="selectedPrefixLength = $any($event); onFind()"
    >
      <d-tab *ngFor="let p of prefixLengthOptions" [id]="p" [title]="'/' + p"></d-tab>
    </d-tabs>
  </div>

  <div *ngIf="result">
    <div *ngIf="result.availableCidrs?.length === 0" style="color: #999; text-align: center; padding: 20px;">
      No available CIDR found in {{ result.parentCidr }}
    </div>
    <div *ngIf="result.availableCidrs?.length > 0" class="cidr-grid">
      <div *ngFor="let cidr of result.availableCidrs | slice:0:16"
           class="cidr-block"
           dClipboard
           [content]="$any(cidr)"
           title="Click to copy"
      >
        {{ cidr }}
      </div>
    </div>
  </div>
</div>
