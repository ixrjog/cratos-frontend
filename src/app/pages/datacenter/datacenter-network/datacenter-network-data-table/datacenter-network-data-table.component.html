<div class="spacing-search">
  <d-button class="button" bsStyle="primary" (click)="onRowNew()">New</d-button>
  <d-search
    class="search"
    [(ngModel)]="queryParam.queryName"
    [iconPosition]="'left'"
    (searchFn)="fetchData()"
  >
  </d-search>
  <d-button class="button" bsStyle="common" (click)="fetchData()">Filter</d-button>
</div>
<div class="spacing-table">
  <d-data-table
    dLoading
    [dataSource]="table.data"
    [tableOverflowType]="'overlay'"
    [backdrop]="true"
    [scrollable]="true"
    [loadingStyle]="'infinity'"
    [loading]="table.loading"
  >
    <d-column field="name" header="Name" [width]="'200px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          {{ rowItem.name || rowItem.edsInstance?.instanceName || '--' }}
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="datacenterType" header="Type" [width]="'120px'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <d-tag *ngIf="cellItem" [tag]="cellItem" [labelStyle]="'blue-w98'"></d-tag>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="Account Entity" [width]="'250px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <div *ngIf="rowItem.accountEntity">
            <div>{{ rowItem.accountEntity.name }}</div>
            <div *ngIf="rowItem.accountEntity.registeredName" style="border-top: 1px solid var(--devui-dividing-line, #dfe1e6); padding-top: 4px; margin-top: 4px; font-size: 12px; color: var(--devui-brand, #5e7ce0);">
              {{ rowItem.accountEntity.registeredName }} <span style="font-size: 11px;">®</span>
            </div>
          </div>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="EDS Instance" [width]="'180px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <div *ngIf="rowItem.edsInstance">
            <div>{{ rowItem.edsInstance.instanceName }}</div>
            <d-tag *ngIf="rowItem.edsInstance.edsType" [tag]="rowItem.edsInstance.edsType" [labelStyle]="'blue-w98'" style="margin-top: 2px;"></d-tag>
          </div>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="Allocations">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <span *ngFor="let alloc of rowItem.allocations" style="display: inline-block; margin: 2px 4px 2px 0;">
            <d-tag [tag]="alloc.name + ' ' + alloc.cidr" [labelStyle]="alloc.allocationType === 'RESERVED' ? 'orange-w98' : 'blue-w98'"></d-tag>
          </span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="valid" header="Valid" [width]="'70px'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <d-icon [icon]="'icon-priority'" [color]="getRowColor(cellItem)"></d-icon>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="Tags" [width]="'200px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <app-business-tags [businessTags]="rowItem['businessTags']"></app-business-tags>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column [width]="'160px'" field="createTime" header="Create Time">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span>{{ cellItem | dDatePipe: 'y-MM-dd HH:mm:ss' }}</span>
          <br>
          <strong>{{ cellItem | dRelativeTime: limit | async }}</strong>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header="Actions" [width]="'120px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <d-icon-group>
            <d-icon [icon]="'icon-edit'" [operable]="true" (click)="onRowEdit(rowItem)" title="Edit"></d-icon>
            <d-icon [icon]="'icon-view'" [operable]="true" (click)="onViewAllocations(rowItem)" title="View Allocations"></d-icon>
            <d-icon [icon]="'icon-refresh'" [operable]="true" (click)="onScanAllocation(rowItem)" title="Scan Allocation"></d-icon>
          </d-icon-group>
        </ng-template>
      </d-cell>
    </d-column>
    <ng-template #noResultTemplateRef>
      <div class="no-data">Fetch Data</div>
    </ng-template>
  </d-data-table>
</div>
<div class="spacing-pagination">
  <d-pagination
    class="pagination"
    [total]="table.pager.total"
    [(pageSize)]="table.pager.pageSize"
    [(pageIndex)]="table.pager.pageIndex"
    [canViewTotal]="true"
    [canChangePageSize]="true"
    [maxItems]="5"
    (pageIndexChange)="pageIndexChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  >
  </d-pagination>
</div>
