<section style="height: 100%; min-height: 600px;">
  <d-card style="padding: 5px 10px; height: 100%;">

    <d-card-header style="position: relative;margin-bottom: 5px;height: 28px">
      <d-card-subtitle>
        <div style="position: absolute;left: 0px;top: 0;display: flex;align-items: center;gap: 12px;font-size: 12px;">
          <span style="color: #666">Login:</span>
          <d-select
            [filterKey]="'name'"
            [options]="serverAccounts"
            [(ngModel)]="selectedServerAccount"
            (valueChange)="onServerAccountChange($event)"
            style="width: 120px">
          </d-select>
          <span style="color: #666">|</span>
          <span style="color: #666">{{ formData.name }}</span>
          <span style="color: #666" dClipboard [content]="formData.assetKey">{{ formData.assetKey }}</span>
        </div>
      </d-card-subtitle>
    </d-card-header>

    <d-card-content style="height: calc(100% - 40px); padding: 0;">
      <div class="eds-asset-ssh-terminal" id="edsAssetSshTerminal" (window:resize)="onResize()"></div>
    </d-card-content>
  </d-card>
</section>
