<section>
  <div *ngIf="JSON.stringify(globalNetworkList) !== '[]'">
    <d-alert [type]="'warning'" [closeable]="false">
      The current CIDR conflicts with these networks
      <li *ngFor="let network of globalNetworkList">
        {{ network.name }} | {{ network.comment }} | {{ network.cidrBlock }}
      </li>
    </d-alert>
    <br />
  </div>
  <div *ngIf="networkInfo !== null">
    <pre>{{ networkInfo.details }}</pre>
  </div>
</section>
