<div class="spacing-search">
  <d-search
    class="search"
    [(ngModel)]="queryParam.queryName"
    [iconPosition]="'left'"
    (searchFn)="fetchData()"
    (change)="fetchData()"
  >
  </d-search>
  <d-select
    class="select"
    style="width: 300px;max-width: 300px"
    [filterKey]="'name'"
    [appendToBody]="true"
    [(ngModel)]="workOrderGroup"
    [searchFn]="onSearchWorkOrderGroup"
    [isSearch]="true"
    placeholder="Select work order group"
    (valueChange)="onWorkOrderGroupChange($event)"
    [allowClear]="true"
  >
  </d-select>
  <d-button class="button" bsStyle="common" (click)="fetchData()">Filter</d-button>
</div>
<div class="spacing-table">
  <d-data-table
    dLoading
    [dataSource]="table.data"
    [tableOverflowType]="'overlay'"
    [backdrop]="true"
    [scrollable]="true"
    [loadingStyle]="'infinity'"
    [loading]="table.loading"
  >
    <d-column field="icon" header="Icon" [width]="'120px'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <i [class]="cellItem"></i>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="workOrderGroup" header="Group">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span>{{ cellItem?.name }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="name" header="Name"></d-column>
    <d-column field="workOrderKey" header="Work Order Key"></d-column>
    <d-column field="color" header="Color">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span dClipboard [content]="cellItem">
            <input type="color" [value]="cellItem" disabled="true" />
            {{ cellItem }}
          </span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="comment" header="Comment"></d-column>
    <d-column header="Actions" [width]="'120px'">
      <d-cell>
        <ng-template let-rowItem="rowItem">
          <d-icon-group>
            <d-icon [icon]="'icon-edit'" [operable]="true" (click)="onRowEdit(rowItem)"></d-icon>
          </d-icon-group>
        </ng-template>
      </d-cell>
    </d-column>
    <ng-template #noResultTemplateRef>
      <div class="no-data">Fetch Data</div>
    </ng-template>
  </d-data-table>
</div>
<div class="spacing-pagination">
  <d-pagination
    class="pagination"
    [total]="table.pager.total"
    [(pageSize)]="table.pager.pageSize"
    [(pageIndex)]="table.pager.pageIndex"
    [canViewTotal]="true"
    [canChangePageSize]="true"
    [maxItems]="5"
    (pageIndexChange)="pageIndexChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  >
  </d-pagination>
</div>
