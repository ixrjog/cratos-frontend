<section>
  <form
    dForm
    ngForm
    [dValidateRules]="formRules['rule']"
    [layout]="layoutDirection"
  >
    <d-row [dGutter]="12" [dGutterNoOuter]="true">
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Name</d-form-label>
          <d-form-control>
            <input dTextInput name="name" [(ngModel)]="formData.name" />
          </d-form-control>
        </d-form-item>
      </d-col>
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Work Order Key</d-form-label>
          <d-form-control>
            <input dTextInput name="workOrderKey" [(ngModel)]="formData.workOrderKey" />
          </d-form-control>
        </d-form-item>
      </d-col>
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Icon</d-form-label>
          <d-form-control [suffixTemplate]="suffixTemplate">
            <input dTextInput name="icon" [(ngModel)]="formData.icon" />
            <ng-template #suffixTemplate>
              <i [class]="formData.icon"></i>
            </ng-template>
          </d-form-control>
        </d-form-item>
      </d-col>
    </d-row>
    <d-row [dGutter]="12" [dGutterNoOuter]="true">
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Seq</d-form-label>
          <d-form-control>
            <d-input-number [min]="1" name="seq" [(ngModel)]="formData.seq" />
          </d-form-control>
        </d-form-item>
      </d-col>
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Color</d-form-label>
          <d-form-control>
            <input type="color" name="color"  [(ngModel)]="formData.color"/>
          </d-form-control>
        </d-form-item>
      </d-col>
      <d-col [dSpan]="8">
        <d-form-item>
          <d-form-label [required]="true">Version</d-form-label>
          <d-form-control>
            <input dTextInput name="version" [(ngModel)]="formData.version" />
          </d-form-control>
        </d-form-item>
      </d-col>
    </d-row>
    <d-form-item>
      <d-form-label [required]="true">I18n</d-form-label>
      <d-form-control>
        <app-ace-editor
          [minLines]="5"
          [maxLines]="10"
          [mode]="'ace/mode/yaml'"
          [aceValue]="formData.i18n"
          (onChange)="onI18nChange($event,formData)"
        >
        </app-ace-editor>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label [required]="true">Workflow</d-form-label>
      <d-form-control>
        <app-ace-editor
          [minLines]="10"
          [maxLines]="30"
          [mode]="'ace/mode/yaml'"
          [aceValue]="formData.workflow"
          (onChange)="onWorkflowChange($event,formData)"
        >
        </app-ace-editor>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label>Description</d-form-label>
      <d-form-control>
        <textarea
          dTextarea
          name="comment"
          maxlength="200"
          style="height: 80px"
          [(ngModel)]="formData.comment"
        ></textarea>
      </d-form-control>
    </d-form-item>
  </form>
</section>
