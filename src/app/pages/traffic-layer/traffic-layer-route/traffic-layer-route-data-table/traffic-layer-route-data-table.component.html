<div class='spacing-search'>
  <d-button class='button' bsStyle='primary' (click)='onRowNew()'>New</d-button>
  <d-search
    class='search'
    [(ngModel)]='queryParam.queryName'
    [iconPosition]="'left'"
    (searchFn)='fetchData()'
    (change)='fetchData()'
  >
  </d-search>
  <app-business-cascader #businessCascader [businessType]='businessType'
                         (onChange)='onTagChanges($event)'></app-business-cascader>
  <d-button class='button' bsStyle='common' (click)='fetchData()'>Filter</d-button>
</div>
<div class='spacing-table'>
  <d-data-table
    dLoading
    [dataSource]='table.data'
    [tableOverflowType]="'overlay'"
    [backdrop]='true'
    [scrollable]='true'
    [loadingStyle]="'infinity'"
    [loading]='table.loading'
    [checkable]='true'
  >
    <d-column header='Web Site' [width]="'200px'">
      <d-cell>
        <ng-template let-rowItem='rowItem'>
          <span dClipboard [content]="rowItem['domainRecord']">{{ rowItem['domainRecord'] }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header='DNS' [width]="'200px'">
      <d-cell>
        <ng-template let-rowItem='rowItem'>
          <div>
            <a class='devui-link-light' [href]="rowItem['consoleUrl']" target='_blank'>{{ rowItem['domain'] }}</a>
          </div>
          <div *ngIf='rowItem.dnsResourceRecordSet && !rowItem.dnsResourceRecordSet.isNoData' style="margin-top: 4px;">
            <div *ngFor='let rr of rowItem.dnsResourceRecordSet.resourceRecords' style="margin-bottom: 2px;">
              <span style="font-size: 12px; color: var(--devui-text-weak);">{{ rr.type }}</span>
              <span *ngFor='let r of rr.resourceRecords' style="margin-left: 6px; font-size: 12px; font-family: monospace;">
                {{ r.value }}<span *ngIf="r.tTL" style="color: var(--devui-text-weak);"> TTL:{{ r.tTL }}</span>
              </span>
            </div>
          </div>
          <div *ngIf='!rowItem.dnsResourceRecordSet || rowItem.dnsResourceRecordSet.isNoData' style="margin-top: 4px;">
            <span style="font-size: 12px; color: var(--devui-text-weak);">No DNS records</span>
          </div>
          <div *ngIf='rowItem.dnsResolverInstance' style="border-top: 1px solid var(--devui-dividing-line, #dfe1e6); margin-top: 6px; padding-top: 6px;">
            <d-tag [tag]='rowItem.dnsResolverInstance.instanceName' [labelStyle]="'blue-w98'"></d-tag>
          </div>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header='Record Targets'>
      <d-cell>
        <ng-template let-rowItem='rowItem'>
          <div *ngFor='let target of rowItem.recordTargets; let i = index' style="margin-bottom: 4px;">
            <span style="display: inline; margin-right: 6px; white-space: nowrap;" [style.visibility]="target.active ? 'visible' : 'hidden'">
              <span dClipboard [content]="rowItem['domainRecord']">{{ rowItem['domainRecord'] }}</span>
              <span style="margin: 0 4px; color: #3ac295;">——→</span>
            </span>
            <div style="display: inline-flex; align-items: center; border-radius: 4px; padding: 2px 8px;"
                 [style.border]="target.active ? '1px solid #3ac295' : 'none'"
                 [style.background]="target.active ? 'rgba(58, 194, 149, 0.1)' : ''">
            <d-tag [tag]="'[ ' + target.recordType + ' ]'" [labelStyle]="target.active ? 'green-w98' : 'default'"></d-tag>
            <span style='margin: 0 5px;'>→</span>
            <span
              *ngIf="target.targetType == 'CLOUDFLARE' && rowItem['dnsResolverInstance']?.edsType == 'CLOUDFLARE'">
                <img *ngIf='!target.dnsResourceRecord?.proxied'
                     ngSrc='assets/icon/cloudflare-onlydns-icon.svg' alt='Cloudflare'
                     style='width: 25px; height: 25px; margin-right: 5px; vertical-align: bottom' height='10' width='10'>
                <img *ngIf='target.dnsResourceRecord?.proxied'
                     ngSrc='assets/icon/cloudflare-proxied-icon.svg' alt='Cloudflare'
                     style='width: 25px; height: 25px; margin-right: 5px; vertical-align: bottom' height='10' width='10'>
            </span>
            <span *ngIf='!target.origin' dClipboard [content]='target.recordValue'>{{ target.recordValue }}</span>
            <span *ngIf='target.origin' dClipboard [content]='target.recordValue'>{{ target.recordValue }}</span>
            <img *ngIf="target.targetType == 'CLOUDFLARE'" ngSrc='assets/icon/cloudflare-icon.svg' alt='Cloudflare'
                 style='width: 20px; height: 20px; margin-left: 10px; vertical-align: bottom' height='64' width='64'>
            <img *ngIf="target.targetType == 'ALIYUN_ALB'" ngSrc='assets/icon/alibabacloud-icon.svg' alt='Alibaba'
                 style='width: 20px; height: 20px; margin-left: 10px; vertical-align: bottom' height='10' width='10'>
            <img *ngIf="target.targetType == 'AWS_ELB'" ngSrc='assets/icon/aws-icon.svg' alt='AWS'
                 style='width: 20px; height: 20px; margin-left: 10px; vertical-align: bottom' height='10' width='10'>
            <img *ngIf="target.targetType == 'HWC_ELB'" ngSrc='assets/icon/huaweicloud-icon.svg' alt='HuaweiCloud'
                 style='width: 20px; height: 20px; margin-left: 10px; vertical-align: bottom' height='10' width='10'>
            <span *ngIf='target.origin'> →
              <d-tag *ngIf='!target.originServer' tag='Origin' [labelStyle]="'blue-w98'"></d-tag>
              <d-tag *ngIf='target.originServer' [tag]='target.originServer' [labelStyle]="'blue-w98'"></d-tag>
            </span>
            <span *ngIf="target.businessTags?.length > 0" style="margin-left: 8px;">
              <d-tag *ngFor="let bt of target.businessTags" [tag]="bt.tag.tagKey + ':' + bt.tagValue" [customColor]="bt.tag.color" style="margin-right: 4px;"></d-tag>
            </span>
            </div>
          </div>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header='Tags' [width]="'250px'">
      <d-cell>
        <ng-template let-rowItem='rowItem'>
          <app-business-tags [businessTags]="rowItem['businessTags']"></app-business-tags>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column header='Actions' [width]="'250px'">
      <d-cell>
        <ng-template let-rowItem='rowItem'>
          <d-icon-group>
            <d-icon [icon]="'icon-edit'" [operable]='true' (click)='onRowEdit(rowItem)'></d-icon>
            <d-icon [icon]="'icon-directory'" [operable]='true' (click)='onRowEditTarget(rowItem)'></d-icon>
            <d-icon [icon]="'icon-switch'" [operable]='true' (click)='onRowSwitchTarget(rowItem)'></d-icon>
            <d-icon [icon]="'icon-add-label'" [operable]='true' (click)='onRowBusinessTag(rowItem)'></d-icon>
            <d-icon [icon]="'icon-go-document'" [operable]='true' (click)='onRowBusinessDoc(rowItem)'></d-icon>
            <d-icon
              [icon]="'icon-priority'"
              [operable]='true'
              [color]="getRowColor(rowItem['valid'])"
              (click)='onRowValid(rowItem)'
            >
            </d-icon>
            <span dDropDown appendToBody>
              <d-icon dDropDownToggle [icon]="'icon-more-operate'" [operable]='true'></d-icon>
              <ul dDropDownMenu>
                <li class='devui-dropdown-item' (click)='onRowDelete(rowItem)'>Delete</li>
              </ul>
            </span>
          </d-icon-group>
        </ng-template>
      </d-cell>
    </d-column>
    <ng-template #noResultTemplateRef>
      <div class='no-data'>Fetch Data</div>
    </ng-template>
  </d-data-table>
</div>
<div class='spacing-pagination'>
  <div dDropDown class='batch-button'>
    <d-button-group>
      <d-button bsStyle='common' dDropDownToggle>
        Batch
        <span class='icon icon-select-arrow'></span>
      </d-button>
    </d-button-group>
    <ul dDropDownMenu class='devui-dropdown-menu' role='menu'>
      <li role='menuitem' (click)='onBatchValid()'>
        <a dDropDownMenuItem>
          <span class='icon-setup' style='padding-right: 5px; vertical-align: middle'> Valid</span>
        </a>
      </li>
      <li role='menuitem' (click)='onBatchTag()'>
        <a dDropDownMenuItem>
          <span class='icon-tag' style='padding-right: 5px; vertical-align: middle'> Tag</span>
        </a>
      </li>
      <li role='menuitem' (click)='onBatchDelete()'>
        <a dDropDownMenuItem>
          <span class='icon-delete' style='padding-right: 5px; vertical-align: middle'> Delete</span>
        </a>
      </li>
    </ul>
  </div>
  <d-pagination
    class='pagination'
    [total]='table.pager.total'
    [(pageSize)]='table.pager.pageSize'
    [(pageIndex)]='table.pager.pageIndex'
    [canViewTotal]='true'
    [canChangePageSize]='true'
    [maxItems]='5'
    (pageIndexChange)='pageIndexChange($event)'
    (pageSizeChange)='pageSizeChange($event)'
  >
  </d-pagination>
</div>
