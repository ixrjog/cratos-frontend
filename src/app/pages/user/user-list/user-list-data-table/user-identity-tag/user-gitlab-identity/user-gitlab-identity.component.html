<section>
  <d-tag
    (click)="fetchData()"
    dLoading
    [loading]="loading"
    dPopover
    style="margin:0 5px 5px 0"
    [position]="'bottom-left'"
    [trigger]="'hover'"
    [controlled]="true"
    [mouseEnterDelay]="500"
    [content]="gitLabIdentitiesTemplate"
    [tag]="'GitLab Identity'"
    [labelStyle]="JSON.stringify(gitLabIdentities) === '[]'?'':'green-w98'"
    [popoverStyle]="{ backgroundColor: 'white', color: 'black',width: '500px',padding: '10px'}"
  ></d-tag>
  <ng-template #gitLabIdentitiesTemplate>
    <div>
      <d-card
        *ngFor="let identity of gitLabIdentities"
        style="padding: 5px 5px;margin-bottom: 10px">
        <d-card-header>
          <d-card-title>{{ identity.instance.instanceName }}</d-card-title>
        </d-card-header>
        <d-card-content>
          <div>

            <div class="card-content">
              <span class="name">SSH Key</span>
              <span class="value">
                <span *ngFor="let sshKey of identity.sshKeys">
                  <i class="fa-solid fa-key"></i>
                  &nbsp;{{ sshKey.assetKey }}
                  <br/>
                </span>
              </span>
            </div>

            <div class="card-content">
              <span class="name">Username</span>
              <span class="value" dClipboard [content]="identity.account.assetKey">
                {{ identity.account.assetKey }}
              </span>
            </div>

            <div class="card-content">
              <span class="name">Email</span>
              <span class="value" dClipboard [content]="identity.account.description">
                {{ identity.account.description }}
              </span>
            </div>

          </div>
        </d-card-content>
      </d-card>
    </div>
    <div *ngIf="JSON.stringify(gitLabIdentities) === '[]'">no data</div>
  </ng-template>
</section>
