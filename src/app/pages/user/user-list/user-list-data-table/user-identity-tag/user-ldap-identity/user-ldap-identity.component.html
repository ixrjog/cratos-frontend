<section>
  <d-tag
    (click)="fetchData()"
    dLoading
    [loading]="loading"
    dPopover
    style="margin:0 5px 5px 0"
    [position]="'bottom-left'"
    [trigger]="'hover'"
    [controlled]="true"
    [mouseEnterDelay]="500"
    [content]="ldapIdentitiesTemplate"
    [tag]="'LDAP Identity'"
    [labelStyle]="JSON.stringify(ldapIdentities) === '[]'?'':'green-w98'"
    [popoverStyle]="{ backgroundColor: 'white', color: 'black',width: '500px',padding: '10px'}"
  ></d-tag>
  <ng-template #ldapIdentitiesTemplate>
    <div>
      <d-card
        *ngFor="let identity of ldapIdentities"
        style="padding: 5px 5px;margin-bottom: 10px">
        <d-card-header>
          <d-card-title>{{ identity.instance.instanceName }}</d-card-title>
        </d-card-header>
        <d-card-content>
          <div>

            <div class="card-content">
              <span class="name">Groups</span>
              <span class="value">
                <d-tag
                  style="margin: 0 3px 3px 0"
                  *ngFor="let group of identity.groups"
                  [labelStyle]="'blue-w98'"
                  [tag]="group"
                ></d-tag>
              </span>
            </div>

            <div class="card-content">
              <span class="name">Username</span>
              <span class="value" dClipboard [content]="identity.account.assetKey">
                {{ identity.account.assetKey }}
              </span>
            </div>

            <div class="card-content">
              <span class="name">Display Name</span>
              <span class="value" dClipboard [content]="identity.account.name">
                {{ identity.account.name }}
              </span>
            </div>

          </div>
        </d-card-content>
      </d-card>
    </div>
    <div *ngIf="JSON.stringify(ldapIdentities) === '[]'">no data</div>
  </ng-template>
</section>
