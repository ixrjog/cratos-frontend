<section>
  <span *ngFor="let permission of permissionMap| keyvalue">
    <h3 style="margin: 5px 0; font-size: 12px; color: var(--devui-aide-text, #8a8e99); font-weight: normal;"> {{ permission.key }}</h3>
    <span *ngIf="JSON.stringify(permission.value) === '[]'">
      <d-tag [tag]="'user.permissions.noPermissions' | translate"></d-tag>
    </span>
    <div class="permissions">
      <d-card *ngFor="let item of permission.value" class="permissions-card">
        <d-card-content>
          <div class="permission-row">
            <d-tag
              dClipboard
              [content]="item.name"
              style="margin-right: 8px;"
              [tag]="item.name"
              [labelStyle]="'blue-w98'"
            >
            </d-tag>
            
            <span 
              *ngFor="let role of item.userPermissions" 
              class="role-compact"
              style="display: inline-block; margin-right: 6px; margin-bottom: 4px; cursor: pointer;"
              (click)="onRowRemove(role)"
            >
              <d-tag [tag]="role" [customViewTemplate]="roleTag" [labelStyle]="role.id !== null ? 'green-w98' : ''"></d-tag>
            </span>
          </div>

          <ng-template #roleTag let-tag="tag">
            <span style="display: inline-flex; align-items: center; gap: 3px;">
              <span class="progress-container circle-type" *ngIf="tag.id !== null">
                <d-progress
                  [type]="'circle'" [strokeWidth]="18"
                  [percentage]="tag.lifeCycleExpires?.survivalRate"
                  [strokeColor]="getProgressColor(tag.expiredTime)"
                  [showContent]="false" style="display: inline-block"
                ></d-progress>
              </span>
              <span>{{ tag.role }}</span>
              <span *ngIf="tag.expiredTime"
                    [style.color]="getExpirationColor(tag.expiredTime)"
                    style="font-size: 10px;"
                    [title]="getExpirationTooltip(tag.expiredTime)"
              >{{ getCompactExpirationText(tag.expiredTime) }}</span>
            </span>
          </ng-template>
          </div>
          
        </d-card-content>
      </d-card>
    </div>
  </span>
</section>
