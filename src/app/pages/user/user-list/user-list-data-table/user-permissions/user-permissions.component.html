<section>
  <span *ngFor="let permission of permissionMap| keyvalue">
    <h3 style="margin: 5px 0" class="font-color-comment"> {{ permission.key }}</h3>
    <span *ngIf="JSON.stringify(permission.value) === '[]'">
      <d-tag [tag]="'No permissions'"></d-tag>
    </span>
    <div class="permissions">
      <d-card *ngFor="let item of permission.value" class="permissions-card">
        <d-card-content>
          <d-tag
            dClipboard
            [content]="item.name"
            style="margin-right: 8px"
            [tag]="item.name"
            [labelStyle]="'blue-w98'"
          >
          </d-tag>
          <d-tag
            *ngFor="let role of item.userPermissions"
            style="margin-right: 5px;"
            [tag]="role.role"
            [labelStyle]="role.id !== null?'green-w98':''"
            (click)="onRowRemove(role)"
          >
          </d-tag>
<!--          <ng-template #customTag let-tag="tag">-->
<!--            <span class="progress-container circle-type">-->
<!--              <d-progress [type]="'circle'" [strokeWidth]="18" [percentage]="20"-->
<!--                          [strokeColor]="'#50d4ab'" [showContent]="false"-->
<!--                          style="display: inline-block"></d-progress>-->
<!--            <span>&nbsp;{{ tag.role }}</span>-->
<!--            </span>-->
<!--          </ng-template>-->
        </d-card-content>
      </d-card>
    </div>
  </span>
</section>
