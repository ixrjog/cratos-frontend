<section>
  <form
    dForm
    ngForm
    [dValidateRules]="formRules['rule']"
    [layout]="layoutDirection"
  >
    <d-form-item>
      <d-form-label>Username</d-form-label>
      <d-form-control>
        <span>{{ formData.username }}</span>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label [required]="true">Renewal Type</d-form-label>
      <d-form-control>
        <d-select name="renewalType" [options]="renewalTypeOptions" [(ngModel)]="renewalType"></d-select>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label [required]="true">Commit</d-form-label>
      <d-form-control>
        <input
          dTextInput
          name="commit"
          [(ngModel)]="commitMsg"
          [dValidateRules]="formRules['commit']" />
      </d-form-control>
    </d-form-item>
  </form>
</section>
