<div class="spacing-search">
  <d-search
    class="search"
    [(ngModel)]="queryParam.queryName"
    [iconPosition]="'left'"
    (searchFn)="fetchData()"
    (change)="fetchData()"
  >
  </d-search>
  <d-button class="button" bsStyle="common" (click)="fetchData()">Filter</d-button>
</div>
<div class="spacing-table">
  <d-data-table
    dLoading
    [dataSource]="table.data"
    [tableOverflowType]="'overlay'"
    [backdrop]="true"
    [scrollable]="true"
    [loadingStyle]="'infinity'"
    [loading]="table.loading"
  >
    <d-column field="asset" header="Name">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span dClipboard [content]="cellItem['name']">{{ cellItem['name'] }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="asset" header="Secret Type">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span>{{ cellItem['kind'] }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="asset" header="Description">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span>{{ cellItem['description'] | dSafeNullPipe }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="asset" header="Create Time" [fieldType]="'date'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <span>{{ cellItem['createdTime'] }}</span>
        </ng-template>
      </d-cell>
    </d-column>
    <d-column field="asset" header="Tags" [width]="'250px'">
      <d-cell>
        <ng-template let-cellItem="cellItem">
          <app-business-tags [businessTags]="cellItem['businessTags']"></app-business-tags>
        </ng-template>
      </d-cell>
    </d-column>
    <ng-template #noResultTemplateRef>
      <div class="no-data">Fetch Data</div>
    </ng-template>
  </d-data-table>
</div>
<div class="spacing-pagination">
  <d-pagination
    class="pagination"
    [total]="table.pager.total"
    [(pageSize)]="table.pager.pageSize"
    [(pageIndex)]="table.pager.pageIndex"
    [canViewTotal]="true"
    [canChangePageSize]="true"
    [maxItems]="5"
    (pageIndexChange)="pageIndexChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  >
  </d-pagination>
</div>
