<section>
  <form
    dForm
    ngForm
    [dValidateRules]="formRules['rule']"
    [layout]="layoutDirection"
  >
    <d-form-item>
      <d-form-label [required]="true">Approve</d-form-label>
      <d-form-control>
        <d-select
          name="approve"
          [filterKey]="'username'"
          [appendToBody]="true"
          [(ngModel)]="approveUser"
          [searchFn]="onSearchCommandExecUser"
          [isSearch]="true"
          placeholder="Search and select approve user"
          (valueChange)="onApproveUserChange($event)"
        >
          <ng-template let-option="option">
            <span>{{ option.username }} : {{ option.name }}</span>
            <span style="float: right; padding: 3px 0">{{ option.email }}</span>
          </ng-template>
        </d-select>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label>CC</d-form-label>
      <d-form-control>
        <d-select
          name="ccTo"
          [filterKey]="'username'"
          [appendToBody]="true"
          [(ngModel)]="ccUser"
          [searchFn]="onSearchUser"
          [isSearch]="true"
          placeholder="Search and select cc user"
          (valueChange)="onCCUserChange($event)"
        >
          <ng-template let-option="option">
            <span>{{ option.username }} : {{ option.name }}</span>
            <span style="float: right; padding: 3px 0">{{ option.email }}</span>
          </ng-template>
        </d-select>
      </d-form-control>
    </d-form-item>
    <d-row [dGutter]="12" [dGutterNoOuter]="true">
      <d-col [dSpan]="12">
        <d-form-item>
          <d-form-label [required]="true">Instance</d-form-label>
          <d-form-control>
            <d-select
              name="instance"
              [filterKey]="'instanceName'"
              [appendToBody]="true"
              [(ngModel)]="instance"
              [searchFn]="onSearchInstance"
              [isSearch]="true"
              placeholder="Search and select instance"
              (valueChange)="onInstanceChange($event)"
            >
            </d-select>
          </d-form-control>
        </d-form-item>
      </d-col>
      <d-col [dSpan]="12">
        <d-form-item>
          <d-form-label [required]="true">Namespace</d-form-label>
          <d-form-control>
            <d-select
              name="namespace"
              [appendToBody]="true"
              [options]="namespaceOptions"
              [(ngModel)]="execTarget.namespace"
              placeholder="Select namespace"
            ></d-select>
          </d-form-control>
        </d-form-item>
      </d-col>
    </d-row>
    <d-form-item>
      <d-form-label [required]="true">Command</d-form-label>
      <d-form-control>
        <app-ace-editor
          [minLines]="10"
          [maxLines]="30"
          [mode]="'ace/mode/yaml'"
          [aceValue]="formData.command"
          (onChange)="onCommandChange($event,formData)"
        >
        </app-ace-editor>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label [required]="true">Auto Exec</d-form-label>
      <d-form-control>
        <d-toggle name="autoExec" [(ngModel)]="formData.autoExec"></d-toggle>
      </d-form-control>
    </d-form-item>
    <d-form-item *ngIf="formData.autoExec">
      <d-form-label [required]="true">Max Waiting Time</d-form-label>
      <d-form-control>
        <div class="composite-slider slider-wrapper">
          <d-slider name="limit" [(ngModel)]="maxWaitingTime" [min]="min" [max]="max" class="slider"></d-slider>
          <div class="snapshot-value">
            <d-input-number
              name="limit"
              [min]="min"
              [max]="max"
              [allowEmpty]="false"
              [(ngModel)]="maxWaitingTime"
              class="input-number"
            ></d-input-number>
          </div>
          <span style="margin-top: 15px">{{ min }}</span>
          <span style="margin:15px 10px 0 0">{{ max }}</span>
        </div>
      </d-form-control>
    </d-form-item>
    <d-form-item>
      <d-form-label [required]="true">Remark</d-form-label>
      <d-form-control>
        <textarea
          dTextarea
          name="applyRemark"
          maxlength="200"
          [(ngModel)]="formData.applyRemark"
        ></textarea>
      </d-form-control>
    </d-form-item>
  </form>
</section>
