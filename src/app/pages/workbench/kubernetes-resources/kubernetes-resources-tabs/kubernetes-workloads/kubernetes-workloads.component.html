<section>
  <d-splitter class="splitter-border" orientation="vertical">
    <d-splitter-pane size="36px" [resizable]="false">
      <div class="splitter-header">
        <h1 style="margin: 0 10px 0 0">{{ application.name }}</h1>

        <div class="layout-center" style="margin-right: 5px">
          <d-tag
            [tag]="JSON.stringify(deploymentList) !== '[]'?'total replicas x' + getTotalReplicas():'Unbound Deployment'"
            [labelStyle]="'blue-w98'"
          ></d-tag>
        </div>

        <div class="layout-center" style="margin-right: 5px" *ngIf="banner?.arms?.valid === true">
          <d-tag [tag]="'ARMS'" [labelStyle]="'blue-w98'" (click)="onRouteArms()"></d-tag>
        </div>

      </div>
    </d-splitter-pane>
    <d-splitter-pane>
      <d-splitter-pane size="30px" [resizable]="false">
        <div style="margin-bottom: 5px" *ngFor="let deployment of deploymentList">
          <app-kubernetes-deployment-splitter
            [application]="application"
            [kubernetesDeployment]="deployment"
            [accessControl]="accessControl"
          ></app-kubernetes-deployment-splitter>
        </div>
      </d-splitter-pane>
    </d-splitter-pane>
  </d-splitter>
</section>
