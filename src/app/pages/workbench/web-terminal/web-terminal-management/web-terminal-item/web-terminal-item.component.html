<section class="web-terminal-item"
         [ngClass]="{'selected': isSelected, 'group-control-mode': isGroupControlMode, 'wide-screen': isWideScreen}">
  <d-card style="padding: 0" [ngClass]="{'selected-card': isSelected}">
    <d-card-header class="terminal-header" style="position: relative;margin-bottom: 5px;height: 28px">
      <d-card-subtitle class="terminal-title">
        <div style="display: flex; align-items: center; flex: 1;">
          <d-checkbox
            style="margin-right: 8px;"
            [(ngModel)]="isSelected"
            (ngModelChange)="onSelectionChange($event)">
          </d-checkbox>
          <span class="font-color-name" style="height: 22px; line-height: 22px;">{{ terminal.assetName }}</span>
          <!-- 群控模式标签 -->
          <d-tag *ngIf="isGroupControlMode && isSelected"
                 [labelStyle]="'blue-w98'"
                 [tag]="'webTerminal.groupControl' | translate"
                 style="margin-left: 8px;">
          </d-tag>
        </div>

        <div class="terminal-actions" style="position: absolute;right: 0;top: 0; display: flex; align-items: center;">
          <!-- 宽屏模式切换按钮 -->
          <d-button
            bsStyle="text"
            size="sm"
            (click)="toggleWideScreen()"
            [title]="isWideScreen ? ('webTerminal.exitWideScreen' | translate) : ('webTerminal.enterWideScreen' | translate)"
            style="margin-right: 4px;">
            <i [class]="isWideScreen ? 'icon-minimize' : 'icon-maxmize'"></i>
          </d-button>

          <d-button
            bsStyle="text"
            (click)="onCloseTerminal()">
            {{ 'webTerminal.close' | translate }}
          </d-button>
        </div>
      </d-card-subtitle>
    </d-card-header>

    <d-card-content class="terminal-content">
      <div class="terminal-info">
        <div class="info-item">
          <span class="label">{{ 'webTerminal.assetId' | translate }}:</span>
          <span class="value">{{ terminal.assetId }}</span>
        </div>
        <div class="info-item">
          <span class="label">{{ 'webTerminal.instanceId' | translate }}:</span>
          <span class="value">{{ terminal.instanceId }}</span>
        </div>
      </div>

      <div
        class="terminal-container"
        [id]="'terminal-' + terminal.instanceId"
        (window:resize)="onResize($event)">
      </div>
    </d-card-content>
  </d-card>
</section>
