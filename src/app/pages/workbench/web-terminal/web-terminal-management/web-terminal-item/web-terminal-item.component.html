<section class="web-terminal-item"
         [ngClass]="{'selected': isSelected, 'group-control-mode': isGroupControlMode, 'wide-screen': isWideScreen}">
  <d-card style="padding: 0" [ngClass]="{'selected-card': isSelected}">
    <d-card-header class="terminal-header" style="position: relative;margin-bottom: 0;height: auto;min-height: 28px;padding: 8px 12px;">
      <d-card-subtitle class="terminal-title">
        <div style="display: flex; align-items: center; flex: 1; flex-wrap: wrap; gap: 8px;">
          <d-checkbox
            style="margin-right: 8px;"
            [(ngModel)]="isSelected"
            (ngModelChange)="onSelectionChange($event)">
          </d-checkbox>

          <!-- 详细信息行 -->
          <div style="display: flex; align-items: center; gap: 16px; font-size: 12px; color: #666;">
            <span>
              <span style="color: #999;">{{ 'webTerminal.assetName' | translate }}:</span>
              <span style="margin-left: 4px;">{{ terminal.assetName }}</span>
            </span>
            <span>
              <span style="color: #999;">IP:</span>
              <span style="margin-left: 4px;" dClipboard [content]="terminal.ip">{{ terminal.ip }}</span>
            </span>
            <span *ngIf="!isMobile">
              <span style="color: #999;">{{ 'webTerminal.instanceId' | translate }}:</span>
              <span style="margin-left: 4px;">{{ terminal.instanceId }}</span>
            </span>
          </div>

          <!-- 主要信息行 -->
          <div style="display: flex; align-items: center; flex: 1; min-width: 0;">
            <!-- 群控模式标签 -->
            <d-tag *ngIf="isGroupControlMode && isSelected"
                   [labelStyle]="'blue-w98'"
                   [tag]="'webTerminal.groupControl' | translate"
                   style="margin-left: 8px;">
            </d-tag>
          </div>
        </div>

        <div class="terminal-actions" style="position: absolute;right: 12px;top: 0; bottom: 0; margin: 0; height: 24px; display: flex; align-items: center;">
          <d-button
            bsStyle="text"
            (click)="onRowBusinessDoc()"
            style="margin-right: 4px;">
            <i [class]="'icon-go-document'"></i>
          </d-button>

          <!-- 宽屏模式切换按钮 -->
          <d-button
            bsStyle="text"
            (click)="toggleWideScreen()"
            [title]="isWideScreen ? ('webTerminal.exitWideScreen' | translate) : ('webTerminal.enterWideScreen' | translate)"
            style="margin-right: 4px;">
            <i [class]="isWideScreen ? 'icon-minimize' : 'icon-maxmize'"></i>
          </d-button>

          <d-button
            bsStyle="text"
            (click)="onCloseTerminal()">
            {{ 'webTerminal.close' | translate }}
          </d-button>
        </div>
      </d-card-subtitle>
    </d-card-header>

    <d-card-content class="terminal-content">
      <div
        class="terminal-container"
        [id]="'terminal-' + terminal.instanceId"
        (window:resize)="onResize($event)">
      </div>
    </d-card-content>
  </d-card>
</section>
