<d-accordion
  style="min-width: 620px"
  [data]="menu"
  [menuItemTemplate]="menuTemplate"
  [itemTemplate]="itemTemplate"
></d-accordion>

<ng-template #menuTemplate let-item="item">
  <i [class]="item.icon"></i>
  &nbsp;{{ item.i18nData['langMap'] | i18nTran }}
</ng-template>

<ng-template #itemTemplate let-item="item">
  <div>
    <span class="left-name">
      <i [class]="item.icon"></i>
    &nbsp;{{ item.i18nData['langMap'] | i18nTran }}
    </span>
    <span class="right-button">
      <d-button
        class="button"
        bsStyle="primary"
        (click)="onRowNew(item)"
        [disabled]="disabled || !item.isUsable"
      >
        {{ item.isUsable ? 'New' : item.status }}
      </d-button>
      <d-button
        *ngIf="item.isUsable"
        class="button"
        bsStyle="common"
        (click)="onRowFilter(item)"
      >Select</d-button>
    </span>

<!--      <span>&nbsp;{{ tag }}</span>-->

</ng-template>
