<app-work-order-base-ticket
  #workOrderBaseTicketComponent
  [ticketDetails]="ticketDetails"
  [editTicketEntryTemplate]="editTicketEntryTemplate"
  [showTicketEntryTemplate]="showTicketEntryTemplate"
  (onGetTicket)="onGetTicketDetail($event)"
  (onHideDialog)="onCancel()"
></app-work-order-base-ticket>

<ng-template #editTicketEntryTemplate>
  <form dForm ngForm [layout]="FormLayout.Vertical">
    <d-form-item>
      <d-form-label [required]="true">Account</d-form-label>
      <d-form-control>
        <d-select
          name="account"
          [appendToBody]="true"
          [filterKey]="'$unique'"
          [(ngModel)]="account"
          [options]="accountOptions"
          placeholder="Select cloud indentity"
          dLoading
          [loading]="loading"
        >
          <ng-template let-option="option">
            <span>{{ option.instance.instanceName }}</span>
            <span style="float: right; padding: 3px 0">{{ option.accountLogin.loginUsername }}</span>
          </ng-template>
        </d-select>
      </d-form-control>
    </d-form-item>
    <ng-template [ngTemplateOutlet]="editTicketEntryExtTemplate"></ng-template>
    <d-form-operation>
      <d-button bsStyle="primary" (click)="onRowAdd()">Add Entry</d-button>
    </d-form-operation>
  </form>
</ng-template>

<ng-template #showTicketEntryTemplate>
  <div *ngIf="JSON.stringify(ticketDetails.entries) !== '[]'">
    <d-data-table
      [dataSource]="ticketDetails.entries"
      [tableOverflowType]="'overlay'"
    >
      <d-column field="instance" header="Instance">
        <d-cell>
          <ng-template let-rowItem="rowItem">
            <span>{{ rowItem['instance']?.instanceName | dSafeNullPipe }}</span>
          </ng-template>
        </d-cell>
      </d-column>
      <d-column field="name" header="Login Username"></d-column>
      <d-column field="detail" header="Login Link">
        <d-cell>
          <ng-template let-cellItem="cellItem">
            <span *ngIf="ticketDetails.ticket.ticketState !== WorkOrderStatus.COMPLETED"
            >{{ cellItem.accountLogin.loginUrl }}</span>
            <a
              *ngIf="ticketDetails.ticket.ticketState === WorkOrderStatus.COMPLETED"
              class="devui-link-light"
              [href]="cellItem.accountLogin.loginUrl" target="_blank">
              {{ cellItem.accountLogin.loginUrl }}
            </a>
          </ng-template>
        </d-cell>
      </d-column>
      <d-column field="detail" header="Password" *ngIf="edsType === 'ALIYUN'">
        <d-cell>
          <ng-template let-cellItem="cellItem">
            <d-toggle [(ngModel)]="cellItem.resetPassword" [disabled]="true"></d-toggle>
          </ng-template>
        </d-cell>
      </d-column>
      <d-column field="detail" header="MFA"  *ngIf="edsType === 'ALIYUN'">
        <d-cell>
          <ng-template let-cellItem="cellItem">
            <d-toggle [(ngModel)]="cellItem.unbindMFA" [disabled]="true"></d-toggle>
          </ng-template>
        </d-cell>
      </d-column>
      <d-column header="Actions" [width]="'80px'" *ngIf="ticketDetails.ticket.ticketState === WorkOrderStatus.NEW">
        <d-cell>
          <ng-template let-rowItem="rowItem">
            <d-icon-group>
              <d-icon [icon]="'icon-delete'" [operable]="true" (click)="onRowRemove(rowItem)"></d-icon>
            </d-icon-group>
          </ng-template>
        </d-cell>
      </d-column>
      <d-column
        header="Result"
        *ngIf="ticketDetails.ticket.ticketState === WorkOrderStatus.COMPLETED
        || ticketDetails.ticket.ticketState === WorkOrderStatus.IN_PROGRESS"
      >
        <d-cell>
          <ng-template let-rowItem="rowItem">
            <d-tag
              *ngIf="rowItem['success']"
              style="margin:0 5px 5px 0"
              [tag]="'success'"
              [labelStyle]="'green-w98'"
            ></d-tag>
            <span>{{ rowItem.result }}</span>
          </ng-template>
        </d-cell>
      </d-column>
    </d-data-table>
  </div>
</ng-template>
