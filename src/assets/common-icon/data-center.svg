<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Gray platform base -->
  <polygon points="8,100 120,100 108,118 4,118" fill="#b0bec5"/>

  <!-- Flat-top hexagons: left one centered between right two -->
  <!-- Top-right hexagon -->
  <polygon points="62,28 74,14 94,14 106,28 94,42 74,42"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Bottom-right hexagon -->
  <polygon points="62,56 74,42 94,42 106,56 94,70 74,70"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left hexagon (vertically centered between the two right ones) -->
  <polygon points="28,42 40,28 60,28 72,42 60,56 40,56"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
