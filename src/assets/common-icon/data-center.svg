<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Gray platform base -->
  <polygon points="8,100 120,100 108,118 4,118" fill="#b0bec5"/>

  <!-- Regular flat-top hexagons: width=30, height=26 (w:h = 2:√3) -->
  <!-- Each hex: center ± (15,0), (7.5, ±13) -->
  <!-- Top-right: center (84, 30) -->
  <polygon points="69,30 76.5,17 91.5,17 99,30 91.5,43 76.5,43"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Bottom-right: center (84, 56) -->
  <polygon points="69,56 76.5,43 91.5,43 99,56 91.5,69 76.5,69"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left: center (61.5, 43) — vertically between the two right ones -->
  <polygon points="46.5,43 54,30 69,30 76.5,43 69,56 54,56"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
