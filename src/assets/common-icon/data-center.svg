<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Gray base/platform -->
  <polygon points="10,95 118,95 105,120 2,120" fill="#b0bec5" rx="4"/>
  
  <!-- Bottom-right hexagon (front) -->
  <polygon points="82,68 98,59 114,68 114,86 98,95 82,86"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
  
  <!-- Left hexagon (middle layer) -->
  <polygon points="22,58 38,49 54,58 54,76 38,85 22,76"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
  
  <!-- Top-right hexagon (back) -->
  <polygon points="58,38 74,29 90,38 90,56 74,65 58,56"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
  
  <!-- White fill inside hexagons to cover overlaps cleanly -->
  <polygon points="82,68 98,59 114,68 114,86 98,95 82,86" fill="var(--devui-base-bg, #fff)"/>
  <polygon points="82,68 98,59 114,68 114,86 98,95 82,86"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
  
  <polygon points="22,58 38,49 54,58 54,76 38,85 22,76" fill="var(--devui-base-bg, #fff)"/>
  <polygon points="22,58 38,49 54,58 54,76 38,85 22,76"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
  
  <polygon points="58,38 74,29 90,38 90,56 74,65 58,56" fill="var(--devui-base-bg, #fff)"/>
  <polygon points="58,38 74,29 90,38 90,56 74,65 58,56"
           fill="none" stroke="#29b6f6" stroke-width="7" stroke-linejoin="round"/>
</svg>
