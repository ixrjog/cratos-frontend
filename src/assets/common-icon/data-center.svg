<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Gray platform base -->
  <polygon points="8,98 120,98 108,118 4,118" fill="#b0bec5"/>

  <!-- Flat-top hexagons (top/bottom edges are flat, left/right are pointed) -->
  <!-- Left hexagon -->
  <polygon points="18,64 30,50 54,50 66,64 54,78 30,78"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Top-right hexagon (shares right edge of left hex) -->
  <polygon points="66,36 78,22 102,22 114,36 102,50 78,50"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Bottom-right hexagon (shares edges with both) -->
  <polygon points="66,64 78,50 102,50 114,64 102,78 78,78"
           fill="none" stroke="#29b6f6" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
